name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t myapp .

      - name: Run Container
        run: docker run -d -p 5000:5000 myapp

      - name: Check running containers
        run: docker ps
