name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t myapp .

      - name: Run Container
        run: docker run -d -p 5000:5000 myapp

      - name: Wait for app to start
        run: sleep 5

      - name: Test app
        run: curl http://localhost:9999

      - name: Deploy step (simulation)
        run: echo "🚀 App deployed successfully!"
